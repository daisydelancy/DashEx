async function sbFetch(table, qs='', method='GET', body=null){
  const h2 = {
    'apikey': SB_KEY,
    'Authorization': 'Bearer '+SB_KEY,
    'Content-Type': 'application/json',
  };
  if(method==='POST')  h2['Prefer']='return=representation';
  if(method==='PATCH') h2['Prefer']='return=representation';
  const res = await fetch(`${SB_URL}/rest/v1/${table}${qs}`,{method,headers:h2,body:body?JSON.stringify(body):undefined});
  if(!res.ok){ const e=await res.text(); throw new Error(e); }
  const txt=await res.text(); return txt?JSON.parse(txt):(method==='DELETE'?true:[]);
}

function useSiteImages(){
  const [imgs,setImgs]=useState({});
  useEffect(()=>{
    db.get('dashex_site_images').then(rows=>{
      const m={...IMG_DEFAULTS};
      rows.forEach(r=>{ if(r.value && !r.value.startsWith('data:')) m[r.key]=r.value; });
      setImgs(m);
    }).catch(()=>{ setImgs({...IMG_DEFAULTS}); });
  },[]);
  return imgs;
}

/* ════════════════════════════════════════════
   AUTH MODAL
════════════════════════════════════════════ */
function AuthModal({tab0='login',onClose,onAuth}){
  const [tab,setTab]=useState(tab0);
  const [le,setLE]=useState(''); const [lp,setLP]=useState(''); const [lerr,setLerr]=useState(''); const [ll,setLL]=useState(false);
  const [rn,setRN]=useState(''); const [re,setRE]=useState(''); const [rph,setRPh]=useState(''); const [rp,setRP]=useState(''); const [rp2,setRP2]=useState(''); const [rerr,setRerr]=useState(''); const [rl,setRL]=useState(false);

  const doLogin=async e=>{
    e.preventDefault(); setLerr(''); setLL(true);
    try{
      const rows=await db.get('dashex_users',`&email=eq.${encodeURIComponent(le.trim().toLowerCase())}`);
      if(!rows.length){setLerr('No account found with that email.');return;}
      if(rows[0].password_hash!==btoa(lp)){setLerr('Incorrect password.');return;}
      setSession(rows[0]); onAuth(rows[0]);
    }catch{setLerr('Login failed. Try again.');}
    finally{setLL(false);}
  };

  const doRegister=async e=>{
    e.preventDefault(); setRerr(''); setRL(true);
    try{
      if(!rn.trim()){setRerr('Enter your full name.');return;}
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(re.trim())){setRerr('Enter a valid email.');return;}
      if(rp.length<6){setRerr('Password must be at least 6 characters.');return;}
      if(rp!==rp2){setRerr('Passwords do not match.');return;}
      const ck=await db.get('dashex_users',`&email=eq.${encodeURIComponent(re.trim().toLowerCase())}&select=id`);
      if(ck.length){setRerr('An account with that email already exists.');return;}
      const [user]=await db.post('dashex_users',{name:rn.trim(),email:re.trim().toLowerCase(),phone:rph.trim()||null,password_hash:btoa(rp)});
      setSession(user); onAuth(user);
    }catch(err){setRerr('Registration failed. Try again.');}
    finally{setRL(false);}
  };

  const sw=t=>{setTab(t);setLerr('');setRerr('');};

  return h('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget)onClose();}},
    h('div',{className:'modal-box fade-in'},
      h('button',{className:'modal-close',onClick:onClose},'x'),
      h('div',{style:{textAlign:'center',marginBottom:'24px'}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',marginBottom:'12px'}},h('div',{style:{width:'48px',height:'48px',background:'#f97316',borderRadius:'12px',display:'flex',alignItems:'center',justifyContent:'center'}},h('span',{style:{color:'#fff',fontWeight:900,fontSize:'24px'}},'D'))),
        h('h2',{style:{fontWeight:900,fontSize:'22px',color:'#0a1628'}},'DashEx Cargo'),
        h('p',{style:{color:'#64748b',fontSize:'14px',marginTop:'4px'}},tab==='login'?'Sign in to your account':'Create your account')
      ),
      h('div',{style:{display:'flex',background:'#f1f5f9',borderRadius:'12px',padding:'4px',marginBottom:'24px',gap:'4px'}},
        h('button',{className:`auth-tab${tab==='login'?' active':''}`,onClick:()=>sw('login')},'Sign In'),
        h('button',{className:`auth-tab${tab==='register'?' active':''}`,onClick:()=>sw('register')},'Create Account')
      ),
      tab==='login'
        ?h('form',{onSubmit:doLogin,style:{display:'flex',flexDirection:'column',gap:'16px'}},
            h('div',null,h('label',{className:'form-label'},'Email'),h('input',{className:'input-field',type:'email',value:le,onChange:e=>setLE(e.target.value),placeholder:'you@example.com',required:true})),
            h('div',null,h('label',{className:'form-label'},'Password'),h('input',{className:'input-field',type:'password',value:lp,onChange:e=>setLP(e.target.value),placeholder:'Your password',required:true})),
            lerr&&h('div',{className:'error-box'},lerr),
            h('button',{type:'submit',className:'btn-orange',style:{padding:'14px',fontSize:'15px',width:'100%'},disabled:ll},ll?'Signing in...':'Sign In'),
            h('p',{style:{textAlign:'center',fontSize:'13px',color:'#64748b'}},'No account? ',h('button',{type:'button',onClick:()=>sw('register'),style:{color:'#f97316',fontWeight:700,background:'none',border:'none',cursor:'pointer'}},'Register here'))
          )
        :h('form',{onSubmit:doRegister,style:{display:'flex',flexDirection:'column',gap:'14px'}},
            h('div',null,h('label',{className:'form-label'},'Full Name *'),h('input',{className:'input-field',type:'text',value:rn,onChange:e=>setRN(e.target.value),placeholder:'John Doe',required:true})),
            h('div',null,h('label',{className:'form-label'},'Email *'),h('input',{className:'input-field',type:'email',value:re,onChange:e=>setRE(e.target.value),placeholder:'you@example.com',required:true})),
            h('div',null,h('label',{className:'form-label'},'Phone'),h('input',{className:'input-field',type:'tel',value:rph,onChange:e=>setRPh(e.target.value),placeholder:'+1 (555) 000-0000'})),
            h('div',null,h('label',{className:'form-label'},'Password *'),h('input',{className:'input-field',type:'password',value:rp,onChange:e=>setRP(e.target.value),placeholder:'At least 6 characters',required:true})),
            h('div',null,h('label',{className:'form-label'},'Confirm Password *'),h('input',{className:'input-field',type:'password',value:rp2,onChange:e=>setRP2(e.target.value),placeholder:'Repeat password',required:true})),
            rerr&&h('div',{className:'error-box'},rerr),
            h('button',{type:'submit',className:'btn-orange',style:{padding:'14px',fontSize:'15px',width:'100%'},disabled:rl},rl?'Creating account...':'Create Account'),
            h('p',{style:{textAlign:'center',fontSize:'13px',color:'#64748b'}},'Already registered? ',h('button',{type:'button',onClick:()=>sw('login'),style:{color:'#f97316',fontWeight:700,background:'none',border:'none',cursor:'pointer'}},'Sign in'))
          )
    )
  );
}

/* ════════════════════════════════════════════
   DASHBOARD FIELD HELPER
════════════════════════════════════════════ */
function DF(label,value,onChange,opts={}){
  return h('div',null,
    h('label',{className:'form-label'},label),
    h('input',{className:'input-field',type:opts.type||'text',value,onChange:e=>onChange(e.target.value),required:opts.required||false,placeholder:opts.placeholder||''})
  );
}

/* ════════════════════════════════════════════
   USER DASHBOARD
════════════════════════════════════════════ */
function Dashboard({user,onLogout}){
  const [view,setView]=useState('overview');
  const [ships,setShips]=useState([]);
  const [loading,setLoading]=useState(false);
  const [form,setForm]=useState(emptyForm());
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const [err,setErr]=useState('');
  const fv=(f,v)=>setForm(p=>({...p,[f]:v}));

  const load=useCallback(async()=>{
    setLoading(true);
    try{ const r=await db.get('dashex_shipments',`&user_id=eq.${user.id}&order=created_at.desc`); setShips(r); }
    catch{}finally{setLoading(false);}
  },[user.id]);

  useEffect(()=>{ load(); },[load]);

  const submit=async e=>{
    e.preventDefault(); setErr(''); setBusy(true);
    try{
      const tn=genTN();
      const today=new Date().toISOString().split('T')[0];
      const now=new Date().toTimeString().slice(0,5);

      // Auto-geocode sender and receiver
      let senderLat=null, senderLng=null, receiverLat=null, receiverLng=null;
      const senderAddr = [form.origin, form.senderCity, form.senderCountry].filter(Boolean).join(', ');
      const receiverAddr = [form.receiverAddress, form.receiverCity, form.receiverCountry].filter(Boolean).join(', ');
      if(senderAddr.trim()){
        const sg = await geocodeAddress(senderAddr);
        if(sg){ senderLat=sg.lat; senderLng=sg.lng; }
      }
      if(receiverAddr.trim()){
        const rg = await geocodeAddress(receiverAddr);
        if(rg){ receiverLat=rg.lat; receiverLng=rg.lng; }
      }

      const [s]=await db.post('dashex_shipments',{
        tracking_number:tn, user_id:user.id,
        sender_name:user.name, sender_email:user.email, sender_phone:user.phone||null,
        sender_city: form.senderCity||null, sender_country: form.senderCountry||null,
        sender_lat: senderLat, sender_lng: senderLng,
        receiver_name:form.receiverName, receiver_email:form.receiverEmail||null, receiver_phone:form.receiverPhone||null,
        receiver_address:form.receiverAddress||null, receiver_city:form.receiverCity, receiver_country:form.receiverCountry,
        receiver_lat: receiverLat, receiver_lng: receiverLng,
        description:form.description, weight:form.weight||null, dimensions:form.dimensions||null,
        package_type:form.packageType, quantity:form.quantity, service_type:form.serviceType,
        origin:form.origin, destination:form.destination,
        estimated_delivery:form.estimatedDelivery||null,
        current_status:'Order Placed', current_location:form.origin,
        special_instructions:form.specialInstructions||null,
      });
      await db.post('dashex_tracking_events',{shipment_id:s.id,status:'Order Placed',location:form.origin,description:'Shipment request received and registered.',event_date:today,event_time:now});
      setMsg(`Shipment submitted! Tracking: ${tn}`);
      setForm(emptyForm());
      await load();
      setView('shipments');
      setTimeout(()=>setMsg(''),12000);
    }catch(e){setErr('Submission failed: '+e.message);}
    finally{setBusy(false);}
  };

  const navItems=[
    {key:'overview', label:'Overview',     svg:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`},
    {key:'new',      label:'New Shipment', svg:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`},
    {key:'shipments',label:'My Shipments', svg:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`},
    {key:'profile',  label:'My Profile',   svg:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`},
  ];

  return h('div',{style:{minHeight:'100vh',background:'#f0f4f8',fontFamily:'Inter,sans-serif'}},
    /* topbar */
    h('div',{style:{background:'linear-gradient(135deg,#0b1f3a,#142f55)',padding:'12px 16px',boxShadow:'0 4px 24px rgba(0,0,0,0.3)',display:'flex',alignItems:'center',justifyContent:'space-between'}},
      h('div',{style:{cursor:'pointer'},onClick:()=>nav('#/')},h(Logo,{size:'sm'})),
      h('div',{style:{display:'flex',alignItems:'center',gap:'16px'}},
        h('span',{style:{color:'#94a3b8',fontSize:'14px'}},'Hello, ',h('span',{style:{color:'#fb923c',fontWeight:700}},user.name)),
        h('button',{onClick:()=>{clearSession();onLogout();},style:{color:'#94a3b8',fontSize:'14px',fontWeight:600,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',padding:'6px 14px',cursor:'pointer'},onMouseEnter:e=>{e.currentTarget.style.color='#f87171';},onMouseLeave:e=>{e.currentTarget.style.color='#94a3b8';}},'Sign Out')
      )
    ),
    h('div',{style:{display:'flex'}},
      /* sidebar */
      h('div',{className:'dash-sidebar'},
        h('div',{style:{marginBottom:'24px',paddingBottom:'24px',borderBottom:'1px solid rgba(255,255,255,0.06)'}},
          h('div',{style:{width:'48px',height:'48px',borderRadius:'50%',background:'#f97316',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:'12px'}},h('span',{style:{color:'#fff',fontWeight:900,fontSize:'20px'}},user.name.charAt(0).toUpperCase())),
          h('div',{style:{color:'#fff',fontWeight:700,fontSize:'15px'}},user.name),
          h('div',{style:{color:'#64748b',fontSize:'12px'}},user.email)
        ),
        navItems.map(it=>h('button',{key:it.key,className:`dash-nav-item${view===it.key?' active':''}`,onClick:()=>setView(it.key)},h('div',{dangerouslySetInnerHTML:{__html:it.svg},style:{width:18,height:18,flexShrink:0}}),it.label)),
        h('div',{style:{flex:1}}),
        h('button',{onClick:()=>nav('#/'),style:{display:'flex',alignItems:'center',gap:'10px',padding:'10px 16px',color:'#475569',fontSize:'13px',fontWeight:500,background:'none',border:'none',cursor:'pointer'}},
          h('div',{dangerouslySetInnerHTML:{__html:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>`},style:{width:16,height:16}}),'Back to Site')
      ),
      /* content */
      h('div',{style:{flex:1,padding:'32px 24px',overflowX:'hidden'}},
        msg&&h('div',{className:'success-banner'},msg),

        /* OVERVIEW */
        view==='overview'&&h('div',null,
          h('h1',{style:{fontSize:'24px',fontWeight:900,color:'#0a1628',marginBottom:'4px'}},`Welcome back, ${user.name.split(' ')[0]}`),
          h('p',{style:{color:'#64748b',marginBottom:'32px'}},'Manage your shipments and track your cargo'),
          h('div',{className:'grid-3',style:{marginBottom:'32px'}},
            [{label:'Total Shipments',value:ships.length,color:'#f97316'},{label:'In Transit',value:ships.filter(s=>s.current_status==='In Transit').length,color:'#3b82f6'},{label:'Delivered',value:ships.filter(s=>s.current_status==='Delivered').length,color:'#22c55e'}]
            .map(m=>h('div',{key:m.label,className:'dash-card',style:{textAlign:'center'}},h('div',{style:{fontSize:'36px',fontWeight:900,color:m.color,marginBottom:'4px'}},m.value),h('div',{style:{color:'#64748b',fontSize:'14px',fontWeight:500}},m.label)))
          ),
          loading?h('div',{style:{textAlign:'center',padding:'32px'}},h('div',{className:'spinner'})):
          ships.length===0
            ?h('div',{className:'dash-card',style:{textAlign:'center',padding:'48px 24px'}},
                h('h3',{style:{fontWeight:700,color:'#0a1628',marginBottom:'8px'}},'No Shipments Yet'),
                h('p',{style:{color:'#94a3b8',fontSize:'14px',marginBottom:'24px'}},'Submit your first shipment request to get started'),
                h('button',{className:'btn-orange',style:{padding:'12px 32px'},onClick:()=>setView('new')},'Send a Shipment'))
            :h('div',null,h('h3',{style:{fontWeight:700,color:'#0a1628',marginBottom:'16px',fontSize:'16px'}},'Recent Shipments'),ships.slice(0,3).map(s=>h(SRow,{key:s.id,s})))
        ),

        /* NEW SHIPMENT */
        view==='new'&&h('div',null,
          h('h1',{style:{fontSize:'24px',fontWeight:900,color:'#0a1628',marginBottom:'24px'}},'New Shipment Request'),
          h('form',{onSubmit:submit},
            h('div',{className:'dash-card'},
              h('h2',{style:{fontWeight:700,color:'#0a1628',marginBottom:'20px',fontSize:'15px',borderBottom:'1px solid #f1f5f9',paddingBottom:'12px'}},'Recipient Details'),
              h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'16px'}},
                DF('Full Name *',form.receiverName,v=>fv('receiverName',v),{required:true}),
                DF('Email',form.receiverEmail,v=>fv('receiverEmail',v),{type:'email'}),

                /* Country dropdown */
                h('div',null,
                  h('label',{className:'form-label'},'Country *'),
                  h('select',{
                    className:'input-field',
                    value:form.receiverCountry,
                    required:true,
                    onChange:e=>{
                      const sel=COUNTRY_PHONE.find(c=>c.name===e.target.value);
                      fv('receiverCountry',e.target.value);
                      if(sel && !form.receiverPhone.trim()){
                        fv('receiverPhone',sel.phone+' ');
                      }
                    }
                  },
                    h('option',{value:''},'— Select Country —'),
                    COUNTRY_PHONE.map(c=>h('option',{key:c.code,value:c.name},c.name))
                  )
                ),

                /* Phone with country code */
                h('div',null,
                  h('label',{className:'form-label'},'Phone'),
                  h('input',{
                    className:'input-field',
                    type:'tel',
                    value:form.receiverPhone,
                    onChange:e=>fv('receiverPhone',e.target.value),
                    placeholder: form.receiverCountry
                      ? (COUNTRY_PHONE.find(c=>c.name===form.receiverCountry)||{}).phone+' ...'
                      : '+1 555-000-0000'
                  })
                ),

                DF('Address',form.receiverAddress,v=>fv('receiverAddress',v)),
                DF('City *',form.receiverCity,v=>fv('receiverCity',v),{required:true}),

                /* ZIP with auto-fill */
                h('div',null,
                  h('label',{className:'form-label'},'ZIP / Postal Code'),
                  h('div',{style:{position:'relative'}},
                    h('input',{
                      className:'input-field',
                      type:'text',
                      value:form.receiverZip||'',
                      placeholder:'e.g. 10001',
                      onChange:async e=>{
                        const z=e.target.value;
                        fv('receiverZip',z);
                        if(z.length>=4){
                          const cc=(COUNTRY_PHONE.find(c=>c.name===form.receiverCountry)||{}).code||'';
                          const res=await zipLookup(z,cc);
                          if(res){
                            fv('receiverCity',res.city);
                            if(!form.receiverCountry) fv('receiverCountry',res.country);

                    h('span',{style:{position:'absolute',right:'10px',top:'50%',transform:'translateY(-50%)',fontSize:'11px',color:'#94a3b8',pointerEvents:'none'}},'auto-fill')

              h('h2',{style:{fontWeight:700,color:'#0a1628',marginBottom:'20px',fontSize:'15px',borderBottom:'1px solid #f1f5f9',paddingBottom:'12px'}},'Package Details'),
              h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'16px'}},
                h('div',{style:{gridColumn:'span 2'}},DF('Description *',form.description,v=>fv('description',v),{required:true,placeholder:'e.g. Electronics, Documents'})),
                DF('Weight (e.g. 2.5 kg) *',form.weight,v=>fv('weight',v),{required:true}),
                DF('Dimensions (e.g. 30x20x15 cm)',form.dimensions,v=>fv('dimensions',v)),
                h('div',null,h('label',{className:'form-label'},'Package Type'),h('select',{className:'input-field',value:form.packageType,onChange:e=>fv('packageType',e.target.value)},PACKAGE_TYPES.map(p=>h('option',{key:p},p)))),

              h('h2',{style:{fontWeight:700,color:'#0a1628',marginBottom:'20px',fontSize:'15px',borderBottom:'1px solid #f1f5f9',paddingBottom:'12px'}},'Shipment Details'),
              h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'16px',marginBottom:'16px'}},
                h('div',null,h('label',{className:'form-label'},'Service Type'),h('select',{className:'input-field',value:form.serviceType,onChange:e=>fv('serviceType',e.target.value)},SERVICE_OPTIONS.map(s=>h('option',{key:s},s)))),
                DF('Origin (City, Country) *',form.origin,v=>fv('origin',v),{required:true,placeholder:'New York, USA'}),
                DF('Destination (City, Country) *',form.destination,v=>fv('destination',v),{required:true,placeholder:'London, UK'}),
                h('div',null,h('label',{className:'form-label'},'Preferred Delivery Date'),h('input',{className:'input-field',type:'date',value:form.estimatedDelivery,onChange:e=>fv('estimatedDelivery',e.target.value)}))
              ),
              h('div',null,h('label',{className:'form-label'},'Special Instructions'),h('textarea',{className:'input-field',value:form.specialInstructions,onChange:e=>fv('specialInstructions',e.target.value),rows:2,placeholder:'Fragile, Keep Dry, etc.',style:{resize:'vertical'}}))
            ),
            err&&h('div',{className:'error-box',style:{marginBottom:'16px'}},err),
            h('div',{style:{display:'flex',gap:'16px',paddingBottom:'32px'}},
              h('button',{type:'submit',className:'btn-orange',style:{flex:1,padding:'16px',fontSize:'17px',fontWeight:900,borderRadius:'16px'},disabled:busy},busy?'Submitting...':'Submit Shipment Request'),
              h('button',{type:'button',onClick:()=>setView('overview'),style:{background:'#f1f5f9',color:'#475569',fontWeight:600,padding:'16px 32px',borderRadius:'16px',border:'none',cursor:'pointer',fontSize:'15px'}},'Cancel')

        view==='shipments'&&h('div',null,

            h('button',{className:'btn-orange',style:{padding:'10px 24px'},onClick:()=>setView('new')},'+ New Shipment')
          ),
          loading?h('div',{style:{textAlign:'center',padding:'32px'}},h('div',{className:'spinner'})):
          ships.length===0?h('div',{className:'dash-card',style:{textAlign:'center',padding:'48px'}},h('p',{style:{color:'#94a3b8'}},'No shipments yet. '),h('button',{onClick:()=>setView('new'),style:{color:'#f97316',fontWeight:700,background:'none',border:'none',cursor:'pointer'}},'Submit your first one.')):

        view==='profile'&&h('div',null,
          h('h1',{style:{fontSize:'24px',fontWeight:900,color:'#0a1628',marginBottom:'24px'}},'My Profile'),

            h('div',{style:{display:'flex',alignItems:'center',gap:'20px',marginBottom:'28px',paddingBottom:'24px',borderBottom:'1px solid #f1f5f9'}},

}

/* ════════════════════════════════════════════
   SHIPMENT MAP (Leaflet)
════════════════════════════════════════════ */
function ShipMap({ship, events}){
  const mapRef  = useRef(null);
  const mapInst = useRef(null);

  useEffect(()=>{
    if(!mapRef.current || !window.L) return;
    if(mapInst.current){ try{mapInst.current.remove();}catch{} mapInst.current=null; }

    // Build ordered path: origin → events (oldest first) → destination
    const pts = [];

    // Origin (sender)
    if(ship.sender_lat && ship.sender_lng)
      pts.push({lat:+ship.sender_lat, lng:+ship.sender_lng, type:'origin',
        label:`<b>📦 Origin</b><br>${ship.origin||ship.sender_city||'Sender'}`});

    // Tracking events sorted oldest → newest for route path
    const orderedEvs = [...events]
      .filter(e => e.location_lat && e.location_lng)
      .sort((a,b)=>{
        const da = new Date(`${a.event_date}T${a.event_time||'00:00'}`);
        const db2 = new Date(`${b.event_date}T${b.event_time||'00:00'}`);
        return da - db2;
      });

    orderedEvs.forEach((e,idx)=> {
      const isLatest = idx === orderedEvs.length - 1;
      pts.push({
        lat: +e.location_lat, lng: +e.location_lng,
        type: isLatest ? 'current' : 'transit',
        label: `<b>${e.status}</b>${e.location?'<br>📍 '+e.location:''}<br><span style="color:#94a3b8;font-size:11px">${e.event_date||''} ${e.event_time||''}</span>`
      });
    });

    // Destination (receiver)
    if(ship.receiver_lat && ship.receiver_lng)
      pts.push({lat:+ship.receiver_lat, lng:+ship.receiver_lng, type:'dest',
        label:`<b>🏁 Destination</b><br>${ship.destination||ship.receiver_city||'Receiver'}`});

    if(!pts.length) return;

    // Dynamic center: prefer latest tracking event, then sender, then receiver
    let centerPt;
    const latestEvent = orderedEvs.length > 0 ? orderedEvs[orderedEvs.length-1] : null;
    if(latestEvent && latestEvent.location_lat && latestEvent.location_lng)
      centerPt = [+latestEvent.location_lat, +latestEvent.location_lng];
    else if(ship.sender_lat && ship.sender_lng)
      centerPt = [+ship.sender_lat, +ship.sender_lng];
    else if(ship.receiver_lat && ship.receiver_lng)
      centerPt = [+ship.receiver_lat, +ship.receiver_lng];
    else
      centerPt = [pts[0].lat, pts[0].lng];

    const map = L.map(mapRef.current, {zoomControl:true, scrollWheelZoom:false}).setView(centerPt, 5);
    mapInst.current = map;

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>', maxZoom:18}).addTo(map);

    // Route polyline
    if(pts.length > 1)
      L.polyline(pts.map(p=>[p.lat, p.lng]),
        {color:'#f97316', weight:3, opacity:.9, dashArray:'10 6'}).addTo(map);

    pts.forEach(p => {
      if(p.type === 'current') {
        // Animated pulsing dot for current location
        const icon = L.divIcon({
          html:`<div style="position:relative;width:22px;height:22px">
            <div style="position:absolute;inset:0;background:#f97316;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 10px rgba(249,115,22,0.6);z-index:2"></div>
            <div style="position:absolute;inset:-6px;background:rgba(249,115,22,0.2);border-radius:50%;animation:pulse 2s ease-in-out infinite;z-index:1"></div>
          </div>`,
          iconSize:[22,22], iconAnchor:[11,11], className:''
        });
        L.marker([p.lat, p.lng], {icon, zIndexOffset:1000}).addTo(map).bindPopup(p.label);
      } else if(p.type === 'transit') {
        L.circleMarker([p.lat, p.lng], {radius:6, fillColor:'#fb923c', color:'#fff', weight:2, fillOpacity:1}).addTo(map).bindPopup(p.label);
      } else {
        const color = p.type==='dest' ? '#22c55e' : '#3b82f6';
        const icon = L.divIcon({
          html:`<div style="background:${color};width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center">
            <div style="width:6px;height:6px;background:rgba(255,255,255,0.9);border-radius:50%"></div></div>`,
          iconSize:[20,20], iconAnchor:[10,10], className:''
        });
        L.marker([p.lat, p.lng], {icon}).addTo(map).bindPopup(p.label);
      }
    });

    // Fit bounds to show all points
    if(pts.length > 1){
      const bounds = L.latLngBounds(pts.map(p=>[p.lat, p.lng]));
      map.fitBounds(bounds, {padding:[40,40], maxZoom:9});
    }

    return ()=>{ try{mapInst.current?.remove();}catch{} };
  }, [ship, events]);

  const hasCoords = (ship.sender_lat&&ship.sender_lng)||(ship.receiver_lat&&ship.receiver_lng)||events.some(e=>e.location_lat&&e.location_lng);
  if(!hasCoords) return null;

  return h('div',{style:{background:'#fff',borderRadius:'16px',padding:'24px',marginBottom:'24px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:'1px solid #f1f5f9'}},
    h('h3',{style:{fontWeight:700,color:'#0a1628',marginBottom:'16px',fontSize:'15px'}},'📍 Live Route Map'),
    h('div',{ref:mapRef,style:{height:'340px',borderRadius:'12px',overflow:'hidden',border:'1px solid #e8edf2',background:'#f0f4f8'}}),
    h('div',{className:'map-legend',style:{marginTop:'12px'}},

async function geocodeAddress(address){
  try {
    const q = encodeURIComponent(address);
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`,{
      headers:{'Accept':'application/json','User-Agent':'DashExCargo/1.0'}
    });
    const data = await res.json();
    if(data && data.length > 0){
      return {lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon)};
    }
  } catch(e){ console.warn('Geocode failed:', e); }
  return null;
}

async function zipLookup(zip, countryCode){
  try {
    const cc = countryCode || '';
    const res = await fetch(`https://api.zippopotam.us/${cc.toLowerCase()}/${zip}`);
    if(!res.ok) return null;
    const data = await res.json();
    if(data.places && data.places.length > 0){
      return {
        city: data.places[0]['place name'],
        state: data.places[0]['state'],
        country: data.country,
        countryCode: data['country abbreviation']
      };
    }
  } catch(e){ console.warn('ZIP lookup failed:', e); }
  return null;
}
